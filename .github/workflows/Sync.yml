name: Sync upstream and open PR

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (master)
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || github.token }}

      - name: Add upstream and merge
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/SteamTracking/GameTracking-CS2.git
          git fetch upstream

          # 在当前工作区把 upstream/master 合并进来（用于生成 PR 的内容）
          git merge upstream/master --no-edit || {
            echo "Merge conflict. Keeping merge result for PR resolution."
            exit 0
          }

          # 可选：忽略上游对 workflow 的变更（保留你自己的）
          git checkout origin/master -- .github/workflows/ 2>/dev/null || true

      - name: Create PR to master
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SYNC_TOKEN || github.token }}
          branch: upstream-sync
          base: master
          title: "Upstream Sync: SteamTracking/GameTracking-CS2"
          body: "自动同步上游仓库变更（PR 模式）"
          commit-message: "chore(sync): merge upstream into upstream-sync"
          delete-branch: false
