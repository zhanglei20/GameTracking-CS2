name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *' # 每30分钟

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || github.token }}

      - name: Prepare changes from upstream (squash, no merge commits)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/SteamTracking/GameTracking-CS2.git || true
          git fetch upstream
          git fetch origin master

          # 将 upstream/master 的变更 squash 到当前 master（不会产生 merge commit）
          git merge --squash upstream/master

          # 忽略上游对 .github/workflows/* 的变更：暂存区和工作区都恢复为 fork master 的状态
          git reset origin/master -- .github/workflows 2>/dev/null || true
          rm -rf .github/workflows
          git checkout origin/master -- .github/workflows 2>/dev/null || true
          git clean -fd -- .github/workflows 2>/dev/null || true

          # 防呆：暂存区和工作区里 workflows 都不能有 diff，避免 push 被 workflow scope 拦截
          if ! (git diff --quiet -- .github/workflows && git diff --cached --quiet -- .github/workflows); then
            echo "Refusing: .github/workflows diff still exists after restore." >&2
            git diff --name-only -- .github/workflows 2>/dev/null || true
            git diff --cached --name-only -- .github/workflows 2>/dev/null || true
            exit 1
          fi

      - name: Create or update PR (open-source)
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.SYNC_TOKEN || github.token }}
          branch: upstream-sync
          base: master
          title: "Upstream Sync: SteamTracking/GameTracking-CS2"
          body: "自动同步上游仓库变更；已忽略上游 .github/workflows/* 的变更。"
          commit-message: "chore(sync): sync upstream changes"
          delete-branch: false

      - name: Merge PR into master
        if: ${{ steps.cpr.outputs.pull-request-number != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN || github.token }}
        run: |
          set -euo pipefail
          pr="${{ steps.cpr.outputs.pull-request-number }}"
          echo "Merging PR #$pr into master"
          # 尝试自动合并并删除分支；--admin 用于绕过部分限制（如果你有权限）
          gh pr merge "$pr" --merge --delete-branch --admin || \
          gh pr merge "$pr" --merge --delete-branch

