name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *' # 每30分钟

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/SteamTracking/GameTracking-CS2.git
          git fetch upstream

      - name: Create sync branch (ignore .github/workflows changes)
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git checkout master
          git pull --ff-only origin master

          BRANCH="upstream-sync"
          git checkout -B "$BRANCH"
          git merge upstream/master --no-edit

          # 忽略上游对 workflow 的变更，恢复为 fork 当前 master 的 .github/workflows/*
          git checkout origin/master -- .github/workflows/ 2>/dev/null || true
          if git diff --staged --quiet && git diff --quiet -- .github/workflows/; then
            : # 无变更，无需提交
          else
            git add .github/workflows/
            git commit -m "chore(sync): keep fork workflows, ignore upstream workflow changes" || true
          fi

          git push -f origin "$BRANCH"

      - name: Create PR for upstream sync
        uses: repo-sync/pull-request@v2
        with:
          source_branch: upstream-sync
          destination_branch: master
          pr_title: "Upstream Sync: SteamTracking/GameTracking-CS2"
          pr_body: "自动同步上游仓库变更"
          github_token: ${{ secrets.GITHUB_TOKEN }}
