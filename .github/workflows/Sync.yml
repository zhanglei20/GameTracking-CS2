name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *' # 每30分钟

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || github.token }}

      - name: Prepare changes from upstream (squash, no merge commits)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/SteamTracking/GameTracking-CS2.git || true
          git fetch upstream
          git fetch origin master

          # 将 upstream/master 的变更 squash 到当前 master（不会产生 merge commit，避免 create-pull-request 的 cherry-pick merge-commit 问题）
          git merge --squash upstream/master

          # 忽略上游对 .github/workflows/* 的任何变更：恢复为 fork master 的目录（可能为空）
          rm -rf .github/workflows
          git checkout origin/master -- .github/workflows 2>/dev/null || true
          git clean -fd -- .github/workflows 2>/dev/null || true

          # 防呆：如果还有 workflows diff，直接失败，避免 push 被 workflow scope 拦截
          if ! git diff --quiet -- .github/workflows; then
            echo "Refusing: .github/workflows diff still exists after restore." >&2
            git diff --name-only -- .github/workflows >&2 || true
            exit 1
          fi

      - name: Create or update PR (open-source)
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.SYNC_TOKEN || github.token }}
          branch: upstream-sync
          base: master
          title: "Upstream Sync: SteamTracking/GameTracking-CS2"
          body: "自动同步上游仓库变更；已忽略上游 .github/workflows/* 的变更。"
          commit-message: "chore(sync): sync upstream changes"
          delete-branch: false
