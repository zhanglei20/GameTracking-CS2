name: Sync upstream and auto-merge

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || github.token }}

      - name: Merge upstream into branch (ignore upstream workflows changes)
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # upstream 可能已存在，允许失败
          git remote add upstream https://github.com/SteamTracking/GameTracking-CS2.git || true
          git fetch upstream

          git checkout -B upstream-sync

          # 合并上游
          git merge upstream/master --no-edit

          # 忽略上游对 workflows 的改动：把它们恢复成你 fork(master) 当前版本
          git checkout origin/master -- .github/workflows 2>/dev/null || true

      - name: Create or update PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SYNC_TOKEN || github.token }}
          branch: upstream-sync
          base: master
          title: "Upstream Sync: SteamTracking/GameTracking-CS2"
          body: "自动同步上游仓库变更；已忽略上游 .github/workflows/* 的变更。"
          commit-message: "chore(sync): merge upstream into upstream-sync"
          delete-branch: false

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/merge-pull-request@v2
        with:
          token: ${{ secrets.SYNC_TOKEN || github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: merge
